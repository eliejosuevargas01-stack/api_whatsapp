<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sessoes WhatsApp</title>
    <link rel="stylesheet" href="/styles.css?v=20260317-6" />
  </head>
  <body class="sessions-page">
    <div class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Painel local</p>
          <h1>Sessoes</h1>
        </div>

        <div class="topbar-actions">
          <a class="action-link" href="/">Abrir conversas</a>
        </div>
      </header>

      <main class="sessions-layout">
        <aside class="panel session-list-panel">
          <div class="panel-head">
            <div>
              <h2>Dispositivos</h2>
              <p class="muted">QR Code e conexao ficam isolados aqui.</p>
            </div>
            <button id="refreshSessionsButton" class="action-button secondary" type="button">
              Atualizar
            </button>
          </div>

          <form id="sessionForm" class="inline-form">
            <input
              id="sessionNameInput"
              type="text"
              name="name"
              placeholder="Ex: iphone-atendimento"
              autocomplete="off"
            />
            <button class="action-button" type="submit">Nova sessao</button>
          </form>

          <div id="sessionList" class="session-list">
            <p class="empty">Carregando sessoes...</p>
          </div>
        </aside>

        <section class="panel session-detail-panel">
          <div class="panel-head">
            <div>
              <h2 id="sessionTitle">Nenhuma sessao selecionada</h2>
              <p id="sessionSubtitle" class="muted">Escolha uma sessao para ver QR e status.</p>
            </div>
            <span id="sessionStatus" class="status-pill status-idle">inativa</span>
          </div>

          <p id="sessionNote" class="notice"></p>

          <div class="session-detail-grid">
            <div class="qr-stage" id="qrFrame">
              <p class="empty">O QR aparece aqui somente quando voce clicar em conectar.</p>
            </div>

            <div class="session-side">
              <dl class="stats-grid">
                <div>
                  <dt>Conta</dt>
                  <dd id="sessionAccount">-</dd>
                </div>
                <div>
                  <dt>Conversas</dt>
                  <dd id="sessionConversationCount">0</dd>
                </div>
                <div>
                  <dt>Mensagens</dt>
                  <dd id="sessionMessageCount">0</dd>
                </div>
                <div>
                  <dt>Nao lidas</dt>
                  <dd id="sessionUnreadCount">0</dd>
                </div>
              </dl>

              <div class="action-row">
                <button id="connectButton" class="action-button" type="button">Conectar / gerar QR</button>
                <button id="logoutButton" class="action-button secondary" type="button">Resetar sessao</button>
                <button id="deleteButton" class="action-button danger" type="button">Excluir sessao</button>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="/sessions.js?v=20260317-6"></script>
  </body>
</html>
